# App Port
server.port=8000

# Database
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5430/user-auth
spring.datasource.username=entropay
spring.datasource.password=entropay

# setting these two properties based on best practice, for more info see https://vladmihalcea.com/connection-monitoring-jpa-hibernate/
spring.datasource.hikari.auto-commit=false
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

# disabling this property, for more info see https://stackoverflow.com/a/48222934/969252 and https://www.baeldung.com/spring-open-session-in-view
spring.jpa.open-in-view=false

# cognito logout
cognitoLogoutUrl=

# MCP OAuth2 auth gateway (RFC 8414 metadata + RFC 7591 Dynamic Client Registration in
# front of Cognito). public-base-url MUST equal the URL clients fetch metadata from;
# override per environment. The values below are templates — set real ones via env vars.
mcp.auth-gateway.public-base-url=
mcp.auth-gateway.cognito-domain=
mcp.auth-gateway.cognito-issuer=
mcp.auth-gateway.user-pool-id=
mcp.auth-gateway.allowed-scopes=openid,email,profile
mcp.auth-gateway.allowed-redirect-uris=https://claude.ai/api/mcp/auth_callback,https://claude.com/api/mcp/auth_callback
mcp.auth-gateway.identity-providers=COGNITO
